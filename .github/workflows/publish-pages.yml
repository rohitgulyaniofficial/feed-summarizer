name: Publish GitHub Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: full
        type: choice
        options:
          - full
          - publish_only
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: github_models
      LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      FEEDS_YAML_B64: ${{ secrets.FEEDS_YAML_B64 }}
      RSS_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Verify required secret
        run: |
          if [ -z "${LLM_API_KEY}" ]; then
            echo "Missing required secret: LLM_API_KEY" >&2
            exit 1
          fi

      - name: Prepare feeds configuration
        run: |
          if [ -n "${FEEDS_YAML_B64}" ]; then
            printf '%s' "${FEEDS_YAML_B64}" | base64 -d > feeds.yaml
            echo "Loaded feeds.yaml from FEEDS_YAML_B64 secret"
          elif [ -f feeds.yaml ]; then
            echo "Using repository feeds.yaml"
          else
            cp feeds.yaml.example feeds.yaml
            echo "feeds.yaml missing; copied feeds.yaml.example"
          fi

      - name: Restore feeds.db cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: feeds.db
          key: feedsdb-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            feedsdb-${{ runner.os }}-${{ github.ref_name }}-

      - name: Run full pipeline
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'full' }}
        run: uv run python main.py run --no-azure

      - name: Run publish-only mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'publish_only' }}
        run: uv run python main.py publish --no-azure

      - name: Save feeds.db cache
        if: always() && hashFiles('feeds.db') != ''
        uses: actions/cache/save@v4
        with:
          path: feeds.db
          key: feedsdb-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
